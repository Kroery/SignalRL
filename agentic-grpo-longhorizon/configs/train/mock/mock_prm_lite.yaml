# Exp 3 Mock: PRM-Lite Reward (5 step)
# 验证 reward_mode=prm_lite 是否正确加载、process score 是否混入 reward signal
# Run: bash scripts/train/mock/run_prm_mock.sh
hydra:
  searchpath:
    - pkg://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  train_files: experiments/vanilla_mock/train.parquet
  val_files: experiments/vanilla_mock/val.parquet
  train_batch_size: 4
  max_prompt_length: 8192
  max_response_length: 12288
  return_raw_chat: True
  tool_config_path: configs/tool_config/tau_bench_airline_tools.yaml

actor_rollout_ref:
  model:
    path: experiments/sft_lora_merged
    enable_gradient_checkpointing: true
    lora_rank: 16
    lora_alpha: 32
    override_config:
      attn_implementation: flash_attention_2
  actor:
    fsdp_config:
      optimizer_offload: true
      param_offload: true
      model_dtype: bf16
    optim:
      lr: 5.0e-6
    use_kl_loss: True
    kl_loss_coef: 0.01
    kl_loss_type: low_var_kl
    ppo_mini_batch_size: 4
    ppo_micro_batch_size_per_gpu: 1
  rollout:
    name: "vllm"
    mode: async
    agent:
      default_agent_loop: tool_agent
    multi_turn:
      enable: True
      format: "hermes"
      max_user_turns: 15
      max_assistant_turns: 15
      tool_config_path: configs/tool_config/tau_bench_airline_tools.yaml
      interaction_config_path: configs/interaction_config/tau_bench_airline_prm_lite.yaml
    n: 4
    temperature: 0.7
    top_p: 0.9
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.50
    free_cache_engine: true
    max_num_seqs: 4
    max_model_len: 24576
    max_num_batched_tokens: 24576
    log_prob_micro_batch_size_per_gpu: 1
    val_kwargs:
      n: 1
      temperature: 0.7
      top_p: 0.9
  ref:
    fsdp_config:
      optimizer_offload: true
      param_offload: true
      model_dtype: bf16
    model:
      path: experiments/sft_lora_merged
      override_config:
        attn_implementation: flash_attention_2
    log_prob_micro_batch_size_per_gpu: 1

algorithm:
  adv_estimator: grpo
  kl_ctrl:
    kl_coef: 0.01

trainer:
  total_epochs: 1
  total_training_steps: 5
  save_freq: -1
  test_freq: -1
  logger: ['console', 'swanlab']
  project_name: agentic-grpo-longhorizon
  experiment_name: mock_prm_lite_5step
  default_local_dir: experiments/prm_lite_mock/checkpoints
  n_gpus_per_node: 1
  nnodes: 1
